<!DOCTYPE HTML PUBLIC "-//W3C//DTD HTML 4.01//EN" "http://www.w3.org/TR/html4/strict.dtd">
<html lang="ja">
<head>
    <meta http-equiv="Content-Type" content="text/html;charset=UTF-8">
    <title>✞ぺやんぐのホームページ✞</title>

    <link rel="stylesheet" href="assets/global.css">
    <script src="assets/global.js"></script>
    <script src="assets/sparkles.js"></script>

    <link rel="stylesheet" href="assets/contents/content_header.css">
    <script src="assets/contents/content_header.js"></script>
    <style>
        input {
            width: 100%;
            font-size: 15px;
            color: black;
            margin-bottom: 10px;
        }

        input[type=text] {
            cursor: text;
        }

        textarea {
            width: 100%;
            font-size: 20px;

            color: black;
            cursor: text;
        }

        input.small {
            width: 25%;
        }

        input.medium {
            width: calc(50% + 16px);
            font-size: 20px;
        }

        #submit_btn {
            margin-top: 10px;
            width: 75px;
            cursor: default;
        }

        fieldset {
            border: 1px solid #ccc;
            padding:20px 90px 20px 90px;
            width: 50vw;
        }

        form {
            width: 100%;
            height: 100%;
        }
    </style>
    <script>

        const emailRegex = /^[a-zA-Z0-9.!#$%&'*+\/=?^_`{|}~-]+@[a-zA-Z0-9](?:[a-zA-Z0-9-]{0,61}[a-zA-Z0-9])?(?:\.[a-zA-Z0-9](?:[a-zA-Z0-9-]{0,61}[a-zA-Z0-9])?)+$/;

        const validation = () => {
            const submitButton = document.getElementById("submit_btn");
            const name = document.getElementById("name");
            const email = document.getElementById("email");
            const title = document.getElementById("f_title");
            const body = document.getElementById("body");
            let disabled;

            if (name.value.length < 1)
                disabled = true
            else if (email.value.length < 1)
                disabled = true
            else if (!emailRegex.test(email.value))
                disabled = true
            else if (title.value.length < 1)
                disabled = true
            else
                disabled = body.value.length < 1;

            submitButton.disabled = disabled;
            return disabled;
        }

        const doSubmit = () => {
            const form = document.getElementsByTagName('form')[0];
            const action = form.getAttribute('action');
            const options = {
                method: 'POST',
                body: new FormData(form)
            };

            fetch(action, options)
                .then((e) => {
                    if (e.status === 200) {
                        window.location = "contact_got.htm";
                    } else {
                        alert("送信に失敗しました！しばらくしてからためしてください！");
                    }
                })
        }

    </script>

</head>
<body>
<header></header>
<div class="container">
    <div id="content_header"></div>

    <h2 class="title">お問い合わせ</h2>
    <br>
    <br>

    <div>
        <form action="$CONTACT_FORM_URL$" method="post">
            <fieldset>
                <input id="name" name="entry.$CONTACT_FORM_NAME_ID$" class="small"
                       type="text" placeholder="お名前" value="名無しさん"
                       onkeydown="validation()" onchange="validation()" onfocus="validation()">
                <input id="email" name="entry.$CONTACT_FORM_EMAIL_ID$" class="small"
                       type="text" placeholder="メールアドレス"
                       onkeydown="validation()" onchange="validation()" onfocus="validation()">
                <br>
                <input id="f_title" name="entry.$CONTACT_FORM_TITLE_ID$" class="medium"
                       type="text" placeholder="タイトル"
                       onkeydown="validation()" onchange="validation()" onfocus="validation()">
                <br>
                <textarea id="body" name="entry.$CONTACT_FORM_MESSAGE_ID$"
                          laceholder="お問い合わせ内容"
                          onkeydown="validation()" onchange="validation()" onfocus="validation()"></textarea>
                <br>
                <input type="button" id="submit_btn" onclick="doSubmit()" value="送信" disabled>
            </fieldset>
        </form>
    </div>
</div>
</body>
</html>
